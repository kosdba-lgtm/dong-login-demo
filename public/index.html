<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Railway Login Demo</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>Railway Login Demo</h1>
      <p>간단한 로그인/회원가입 페이지입니다.</p>

      <form id="authForm">
        <label>
          이름
          <input id="nameInput" type="text" name="name" placeholder="홍길동" />
        </label>
        <label>
          이메일
          <input id="emailInput" type="text" name="email" placeholder="test@example.com" />
        </label>
        <label>
          비밀번호
          <input id="passwordInput" type="password" name="password" placeholder="password" required />
        </label>
      </form>

      <div id="message" class="message"></div>

      <div class="bottom-actions">
        <button id="loginButton" class="action-button active">로그인</button>
        <button id="signupButton" class="action-button">회원가입</button>
      </div>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
